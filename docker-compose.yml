# 环境变量已直接写在本文件中（不使用根目录 .env）。
# 生产环境请修改 SECRET_KEY、JWT_SECRET_KEY、DATA_ENCRYPTION_KEY、数据库口令等敏感项。
#
# 若使用 Cloudflare 且源站仅开放本 compose 的 80 端口：面板 SSL 请选「灵活」(Flexible)，
# 否则 CF 用 HTTPS 回源而源站无 443 证书时会出现 502。

version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: ops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Pass1234.
      MYSQL_DATABASE: ops_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ops-backend
    restart: unless-stopped
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "5000"
      FLASK_DEBUG: "false"
      SECRET_KEY: "3e5f346fcb9f114056412edefad6d26a4553c133818cdda22b795b2183648c40"
      JWT_SECRET_KEY: "637cabcec1b41df5164d0b0dd720eefe7594301cbdbbceba441620fe84f4d0df"
      JWT_EXPIRATION_HOURS: "24"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: Pass1234.
      DB_NAME: ops_platform
      CORS_ORIGINS: "http://localhost,http://127.0.0.1,https://localhost,https://127.0.0.1,https://opm.pepsikey.online"
      CORS_ALLOW_ALL: "false"
      DATA_ENCRYPTION_KEY: "O1VNkxEKDSm7lJ_hBFODcMYRO5RCa_KmYlYVv2Bq7Oc="
      OPS_DEV_ENCRYPTION_FALLBACK: "false"
      WECHAT_WEBHOOK_URL: ""
      SSL_CHECK_TIMEOUT: "10"
      SSL_WARNING_DAYS: "30"
      DOMAIN_WARNING_DAYS: "30"
      CERT_AUTO_CHECK_CRON: "0 8 * * *"
      DOMAIN_AUTO_NOTIFY_CRON: "0 8 * * *"
      GRAFANA_URL: "https://grafana.huazsz.com"
      GRAFANA_DASHBOARDS: '[{"name":"主机监控","uid":"StarsL-JOB-node"},{"name":"容器监控","uid":"pMEd7m0Mz"}]'
    volumes:
      - ./backend/app/uploads:/app/app/uploads
    ports:
      - "5000:5000"
    networks:
      - ops-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  frontend:
    image: nginx:alpine
    container_name: ops-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - ops-network
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  ops-network:
    driver: bridge
