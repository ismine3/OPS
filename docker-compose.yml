version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: ops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Pass1234.
      MYSQL_DATABASE: ops_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      # 注意：MySQL初始化目录通常用于SQL脚本
      # 如需执行Python初始化，请在backend服务启动时处理
    ports:
      - "3306:3306"
    networks:
      - ops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ops-backend
    restart: unless-stopped
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=Pass1234.
      - DB_NAME=ops_platform
      - SECRET_KEY=${SECRET_KEY:-ops-platform-secret-key-change-in-prod}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key-change-in-prod}
    volumes:
      - ./backend/app/uploads:/app/app/uploads
    ports:
      - "5000:5000"
    networks:
      - ops-network
    depends_on:
      mysql:
        condition: service_healthy

  # 前端 Nginx 服务
  frontend:
    image: nginx:alpine
    container_name: ops-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - ops-network
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  ops-network:
    driver: bridge
